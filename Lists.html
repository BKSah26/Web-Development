<!DOCTYPE html>
<html>
    <head>
        <title>Lists in HTML</title>
    </head>
    <body>
        <!-- Unordered Lists -->
        <ul>
            <li>Bingo</li>
            <li>Kurkure</li>
            <li>Lay's</li>
        </ul>

        <!-- Ordered Lists -->
         <ol>
            <li>Paani garam karo</li>
            <li>Chai patto daalo</li>
            <li>Chai pee lo</li>
         </ol>
    </body>
</html>
