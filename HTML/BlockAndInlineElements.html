<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Block and Inline Elements</title>
</head>
<body>
	<!-- Div is a Block Element -->
	<div style="background-color: aqua;">This is my Div Tag.</div>
	<!-- Span is an Inline Element -->
	<span style="background-color: khaki;">This is my Span Tag.</span>
	<p style="background-color: green;">This is a paragraph. Paragraph is also a block element.</p>

	<!-- Converting block elements to inline elements -->
	<p style="display: inline; background-color: olive;">This is a paragraph converted into an inline element.</p>
</body>
</html>
